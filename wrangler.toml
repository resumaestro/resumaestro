name = "job-slack"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# R2: the agent and the worker share the same bucket as the source of truth.
[[r2_buckets]]
binding = "JOB_SOURCE"
bucket_name = "job-source"

# D1: the queryable job-pipeline record (companies + jobs). One-time setup:
#   npx wrangler d1 create job-pipeline          # paste the returned database_id below
#   npx wrangler d1 execute job-pipeline --file=./schema.sql
[[d1_databases]]
binding = "DB"
database_name = "job-pipeline"
database_id = "316f5071-ab12-42c4-90e8-18a8f090a016"

# Workers AI — embeddings for the /data gateway.
[ai]
binding = "AI"

# Vectorize — the four indices the job-application system queries and upserts.
[[vectorize]]
binding = "VEC_COMPANY"
index_name = "job-company"

[[vectorize]]
binding = "VEC_PEOPLE"
index_name = "job-people"

[[vectorize]]
binding = "VEC_ROLE"
index_name = "job-role"

[[vectorize]]
binding = "VEC_CODE"
index_name = "source-code-rag"

[vars]
SLACK_CHANNEL = "C0BA8G3UFNJ"   # #orchestra — where /add posts the root + card
STAGE_CHANNEL = ""              # #orchestra-stage channel id (recreate target for [Stage])
PARKING_LOT_CHANNEL = ""        # #orchestra-parking-lot channel id (recreate target for [Park])
AGENT_WEBHOOK_URL = ""          # Hyperagent webhook invocation URL for the single agent

# Secrets (do NOT put in this file):
#   wrangler secret put SLACK_BOT_TOKEN       # xoxb-... chat:write + files:write to #orchestra
#   wrangler secret put SLACK_SIGNING_SECRET  # verify slash-command + interactivity payloads
#   wrangler secret put AGENT_API_TOKEN       # bearer for /data/* AND the agent -> worker /jobs/:id/result callback
