name = "job-slack"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# R2: the agent and the worker share the same bucket as the source of truth.
[[r2_buckets]]
binding = "JOB_SOURCE"
bucket_name = "job-source"

# Workers AI — embeddings for the /data gateway. Replaces the embed calls that
# used to go through the Composio mcp-cloudflare integration.
[ai]
binding = "AI"

# Vectorize — the four indices the job-application system queries and upserts.
# All are 1024-dim, cosine. The /data gateway maps friendly names to these bindings.
[[vectorize]]
binding = "VEC_COMPANY"
index_name = "job-company"

[[vectorize]]
binding = "VEC_PEOPLE"
index_name = "job-people"

[[vectorize]]
binding = "VEC_ROLE"
index_name = "job-role"

[[vectorize]]
binding = "VEC_CODE"
index_name = "source-code-rag"

# Secrets Store — Slack app *config* tokens, read at runtime via these bindings
# (read-only: env.SLACK_CONFIG_TOKEN.get()). Create the store + two secrets, then
# drop the store id into both bindings AND the SECRETS_STORE_ID var below (the var
# is what the rotated-token write-back REST call uses, since the binding can't read it).
[[secrets_store_secrets]]
binding = "SLACK_CONFIG_TOKEN"
store_id = "<STORE_ID>"
secret_name = "SLACK_CONFIG_TOKEN"

[[secrets_store_secrets]]
binding = "SLACK_CONFIG_REFRESH_TOKEN"
store_id = "<STORE_ID>"
secret_name = "SLACK_CONFIG_REFRESH_TOKEN"

[vars]
# #orchestra channel id (where the worker drops the control line that wakes the agent)
SLACK_CHANNEL = "C0BA8G3UFNJ"
# Optional: the agent's Slack handle, e.g. "<@U0123ABCD>". Set this if #orchestra's
# trigger mode is "mentions only" so the worker's control line force-triggers the agent.
# Leave blank if the channel trigger mode is "always respond".
AGENT_MENTION = ""

# ---- /admin/update-manifest ----
SLACK_APP_ID = "<SLACK_APP_ID>"                       # Slack app to update (A...); body.app_id overrides
CF_ACCOUNT_ID = "281f6b8969eb59a0dec34daaafd69a29"    # for rotated-token write-back
SECRETS_STORE_ID = "<STORE_ID>"                       # same id as the secrets_store_secrets bindings above

# Secrets (do NOT put in this file):
#   wrangler secret put SLACK_BOT_TOKEN     # xoxb-... bot token, chat:write to #orchestra
#   wrangler secret put AGENT_API_TOKEN     # bearer token the skills present to /data/* and /admin/*
#   wrangler secret put CF_API_TOKEN        # CF API token w/ Secrets Store Edit — writes rotated Slack
#                                           # config tokens back to the store. Optional: if unset,
#                                           # /admin/update-manifest returns the new pair in its response.
