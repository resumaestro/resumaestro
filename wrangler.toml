name = "job-slack"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# R2: the agent and the worker share the same bucket as the source of truth.
[[r2_buckets]]
binding = "JOB_SOURCE"
bucket_name = "job-source"

# D1: the queryable job-pipeline record (companies + jobs). One-time setup:
#   npx wrangler d1 create job-pipeline          # paste the returned database_id below
#   npx wrangler d1 execute job-pipeline --file=./schema.sql
[[d1_databases]]
binding = "DB"
database_name = "job-pipeline"
database_id = "REPLACE_WITH_database_id_FROM_d1_create"

# Workers AI — embeddings for the /data gateway.
[ai]
binding = "AI"

# Vectorize — the four indices the job-application system queries and upserts.
[[vectorize]]
binding = "VEC_COMPANY"
index_name = "job-company"

[[vectorize]]
binding = "VEC_PEOPLE"
index_name = "job-people"

[[vectorize]]
binding = "VEC_ROLE"
index_name = "job-role"

[[vectorize]]
binding = "VEC_CODE"
index_name = "source-code-rag"

[vars]
SLACK_CHANNEL = "C0BA8G3UFNJ"   # #orchestra — where /add posts the root + card
STAGE_CHANNEL = ""              # #orchestra-stage channel id (recreate target for [Stage])
PARKING_LOT_CHANNEL = ""        # #orchestra-parking-lot channel id (recreate target for [Park])
AGENT_WEBHOOK_URL = ""          # Hyperagent webhook invocation URL for the single agent
SLACK_APP_ID = "A0BA7JJ1LKX"   # App ID — shown in App Settings; safe to commit
CF_ACCOUNT_ID = ""              # Cloudflare account ID — for writing back rotated config tokens
CF_WORKER_NAME = "job-slack"    # Worker script name — used in token write-back API path

# Secrets (do NOT put in this file):
#   wrangler secret put SLACK_BOT_TOKEN              # xoxb-... chat:write + files:write to #orchestra
#   wrangler secret put SLACK_SIGNING_SECRET         # verify slash-command + interactivity payloads
#   wrangler secret put AGENT_API_TOKEN              # bearer for /data/*, /jobs/:id/result, /admin/*
#
#   # Slack config tokens — for apps.manifest.update (different from the bot token).
#   # Obtain at https://api.slack.com/authentication/config-tokens (one-time OAuth flow).
#   wrangler secret put SLACK_CONFIG_ACCESS_TOKEN    # xoxe.xoxp-... (short-lived, auto-rotated)
#   wrangler secret put SLACK_CONFIG_REFRESH_TOKEN   # xoxe-... (long-lived)
#
#   # Optional: lets the worker write rotated config tokens back to its own secrets.
#   # Without it, new token pairs are returned to CI in .rotated.new_tokens for manual storage.
#   wrangler secret put CF_API_TOKEN                 # CF token with workers:edit permission
