name = "resumaestro-resumaestro"
main = "src/server.ts"
compatibility_date = "2025-01-01"

[observability]
enabled = true
head_sampling_rate = 1

# R2: shared source-of-truth bucket.
[[r2_buckets]]
binding = "RESUMAESTRO_SOURCE"
bucket_name = "resumaestro-source"

# D1: queryable pipeline record (companies + jobs).
[[d1_databases]]
binding = "DB"
database_name = "resumaestro-pipeline"
database_id = "72bff802-4593-4ed3-9c4f-1923bcb1b406"

# Workers AI — embeddings for the /data gateway.
[ai]
binding = "AI"

# Vectorize — four indices, 1024-dim cosine.
[[vectorize]]
binding = "RESUMAESTRO_COMPANIES"
index_name = "resumaestro-companies"

[[vectorize]]
binding = "RESUMAESTRO_TEAMMEMBERS"
index_name = "resumaestro-teammembers"

[[vectorize]]
binding = "RESUMAESTRO_ROLES"
index_name = "resumaestro-roles"

[[vectorize]]
binding = "VEC_CODE"
index_name = "source-code-rag"

# Service binding to composer (intelligence plane).
[[services]]
binding = "COMPOSER"
service = "resumaestro-composer"

# KV — dynamic config: model names, feature flags.
[[kv_namespaces]]
binding = "RESUMAESTRO_CONFIG"
id = "0178e5c12f4945f0a230ac7d1f04b4fa"

[secrets]
required = [
  "SLACK_BOT_TOKEN",              # xoxb-... chat:write + files:write
  "SLACK_SIGNING_SECRET",         # slash commands + interactivity verification
  "GEOAPIFY_API_KEY",             # commute routing API key
]
