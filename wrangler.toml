name = "resumaestro-resumaestro"
main = "src/server.ts"
compatibility_date = "2025-01-01"

# R2: shared source-of-truth bucket.
[[r2_buckets]]
binding = "RESUMAESTRO_SOURCE"
bucket_name = "resumaestro-source"

# D1: queryable pipeline record (companies + jobs).
[[d1_databases]]
binding = "DB"
database_name = "resumaestro-pipeline"
database_id = "72bff802-4593-4ed3-9c4f-1923bcb1b406"

# Workers AI — embeddings for the /data gateway.
[ai]
binding = "AI"

# Vectorize — four indices, 1024-dim cosine.
[[vectorize]]
binding = "RESUMAESTRO_COMPANIES"
index_name = "resumaestro-companies"

[[vectorize]]
binding = "RESUMAESTRO_TEAMMEMBERS"
index_name = "resumaestro-teammembers"

[[vectorize]]
binding = "RESUMAESTRO_ROLES"
index_name = "resumaestro-roles"

[[vectorize]]
binding = "VEC_CODE"
index_name = "source-code-rag"

# Secrets Store — Slack app config tokens (read-only at runtime via .get()).
[[secrets_store_secrets]]
binding = "SLACK_CONFIG_TOKEN"
store_id = "5376e6440f0a470496364c1a036ecac8"
secret_name = "SLACK_CONFIG_TOKEN"

[[secrets_store_secrets]]
binding = "SLACK_CONFIG_REFRESH_TOKEN"
store_id = "5376e6440f0a470496364c1a036ecac8"
secret_name = "SLACK_CONFIG_REFRESH_TOKEN"

[vars]
SLACK_CHANNEL = "C0BA8G3UFNJ"
STAGE_CHANNEL = ""
PARKING_LOT_CHANNEL = ""
AGENT_WEBHOOK_URL = ""
AGENT_MENTION = ""
SLACK_APP_ID = "A0BA7JJ1LKX"
CF_ACCOUNT_ID = "281f6b8969eb59a0dec34daaafd69a29"
SECRETS_STORE_ID = "5376e6440f0a470496364c1a036ecac8"

[secrets]
required = [
  "SLACK_BOT_TOKEN",       # xoxb-... chat:write + files:write
  "SLACK_SIGNING_SECRET",  # slash commands + interactivity verification
  "AGENT_API_TOKEN",       # bearer for /data/*, /jobs/:id/result, /admin/*
  "CF_API_TOKEN",          # CF token w/ Secrets Store Edit (for token write-back)
]
