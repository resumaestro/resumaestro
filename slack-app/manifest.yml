display_information:
  name: Conductor
  description: Job Application Bot
  background_color: "#004492"
features:
  bot_user:
    display_name: conductor
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  slash_commands:
    - command: /add-job
      url: https://job-slack.cameronaziz.workers.dev/commands/add
      description: Add a job to the pipeline
      usage_hint: "{link}"
      should_escape: false
oauth_config:
  redirect_urls:
    - https://hyperagent.com/api/slack/oauth/callback
  scopes:
    user:
      - channels:history
      - channels:read
      - channels:write.invites
      - groups:history
      - groups:read
      - groups:write.invites
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - reactions:read
      - search:read
      - team:read
      - users:read
      - users:read.email
      - files:read
    bot:
      - commands              # required for slash commands
      - chat:write
      - chat:write.customize
      - channels:history
      - channels:read
      - channels:join
      - groups:read
      - groups:history
      - app_mentions:read
      - im:history
      - im:write
      - links:read
      - links:write
      - reactions:write
      - files:write           # attach brief + resume PDF in-thread (retires Slack File Upload skill)
  pkce_enabled: false
settings:
  interactivity:
    is_enabled: true
    # Buttons + modals (block_actions / view_submission) post here.
    request_url: https://job-slack.cameronaziz.workers.dev/slack/interactivity
  event_subscriptions:
    # Worker handles app_home_opened directly (pure data render, no AI needed).
    # app_mention is forwarded to AGENT_WEBHOOK_URL to wake the Conductor agent.
    request_url: https://job-slack.cameronaziz.workers.dev/slack/events
    bot_events:
      - app_home_opened       # NEW: render the pipeline home view
      - app_mention           # wake the Conductor agent
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
