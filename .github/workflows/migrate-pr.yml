name: Provision (PR dry-run)

on:
  pull_request:
    branches: [main]
    paths:
      - "config.yml"
      - "provision/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  dry-run:
    runs-on: ubuntu-latest
    environment: sandbox-lock
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Protect provision files
        uses: resumaestro/pit-boss/actions/protect@main
        with:
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

      - name: Dry-run
        id: dry-run
        uses: resumaestro/pit-boss/actions/dry-run@main
        with:
          target: SANDBOX
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

      - name: Comment result on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.dry-run.outputs.passed }}" == "true" ]]; then
            BODY="✅ Provision dry-run passed. Migrations and seeds roundtrip-tested on sandbox."
          else
            BODY="❌ Provision dry-run failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo resumaestro/resumaestro \
            --body "$BODY"

      - name: Fail if dry-run did not pass
        if: steps.dry-run.outputs.passed == 'false'
        run: exit 1
