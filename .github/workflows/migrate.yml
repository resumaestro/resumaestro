name: Migrate D1

on:
  push:
    branches: [main]
    paths:
      - "config.json"
      - "migrations/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  # ---- Job 1: dry-run + migrate ---------------------------------------------
  dry-run:
    runs-on: ubuntu-latest
    environment: sandbox-lock
    outputs:
      passed: ${{ steps.migrate.outputs.passed }}
      needed: ${{ steps.migrate.outputs.needed }}
      actual: ${{ steps.migrate.outputs.actual }}
      target: ${{ steps.migrate.outputs.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Run migration
        id: migrate
        uses: resumaestro/pit-boss/actions/d1-migrate@main
        with:
          db_name: job-pipeline
          sandbox_db_name: resumaestro-pipeline-sandbox
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  # ---- Job 2: apply to production (dry-run passed) --------------------------
  migrate:
    needs: dry-run
    if: needs.dry-run.outputs.needed == 'true' && needs.dry-run.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations to production
        uses: resumaestro/pit-boss/actions/d1-migrate@main
        with:
          db_name: job-pipeline
          sandbox_db_name: resumaestro-pipeline-sandbox
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  # ---- Job 3: open revert PR (dry-run failed) -------------------------------
  revert:
    needs: dry-run
    if: needs.dry-run.outputs.needed == 'true' && needs.dry-run.outputs.passed == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Open revert PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="revert/migration-${{ github.sha }}"
          BRANCH="${BRANCH:0:50}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git revert --no-edit "${{ github.sha }}"
          git push origin "$BRANCH"

          gh pr create \
            --repo resumaestro/resumaestro \
            --title "Revert: migration dry-run failed (${{ github.sha }})" \
            --body "$(cat <<'EOF'
          ## Automated revert

          The migration dry-run failed on commit ${{ github.sha }}.

          The sandbox roundtrip test did not pass — nothing was applied to the real DB.

          **To fix:** correct the failing migration's \`.up.sql\` or \`.down.sql\` so the roundtrip is clean, then re-merge.

          See the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
