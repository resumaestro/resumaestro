name: Provision

on:
  push:
    branches: [main]
    paths:
      - "provision/pipeline/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: provision
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: sandbox-lock
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision
        id: provision
        uses: resumaestro/pit-boss/actions/provision@main
        with:
          production_target: RUSUMAESTRO_PIPELINE
          staging_target: RUSUMAESTRO_PIPELINE_STAGING
          provision_dir: provision/pipeline
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

      - name: Open revert PR
        if: failure() && steps.provision.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="revert/provision-${{ github.sha }}"
          BRANCH="${BRANCH:0:50}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git revert --no-edit "${{ github.sha }}"
          git push origin "$BRANCH"

          gh pr create \
            --repo resumaestro/resumaestro \
            --title "Revert: provision failed (${{ github.sha }})" \
            --body "$(cat <<'EOF'
          ## Automated revert

          Provisioning failed on commit ${{ github.sha }}.

          Nothing was applied to the real DB.

          **To fix:** correct the failing migration or seed, then re-merge.

          See the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
